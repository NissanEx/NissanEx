<!-- ===== MAIN ===== -->
<main class="flex-1 lg:ml-64 p-4 md:p-8 min-h-screen">

  <!-- HEADER -->
  <header class="mb-8">
    <div class="lg:hidden flex items-center justify-between gap-4 mb-4">
      <div class="flex items-center gap-3">
        <button onclick="toggleSidebar()" class="p-2 text-black"><i class="fas fa-bars text-xl"></i></button>

      </div>
      <div class="flex items-center gap-2">
        <button onclick="toggleMobileSearch()" class="p-2"><i class="fas fa-search text-xl"></i></button>
        <a href="profil.html" class="p-2"><i class="fas fa-user-circle text-xl"></i></a>
      </div>
    </div>
    <div id="mobile-search-bar" class="hidden lg:hidden mb-4">
      <div class="relative">
        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-500"><i class="fas fa-search"></i></span>
        <input type="text" oninput="handleSearch(this.value)" placeholder="Cari konten atau kategori..." class="w-full bg-black text-white py-3 pl-12 pr-4 rounded-2xl outline-none placeholder:text-gray-500 text-sm">
      </div>
    </div>
    <div class="hidden lg:flex items-center gap-4">
      <div class="flex-1 relative">
        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-500"><i class="fas fa-search"></i></span>
        <input id="global-search" type="text" oninput="handleSearch(this.value)" placeholder="Cari konten atau kategori..." class="w-full bg-black text-white py-3.5 pl-12 pr-4 rounded-2xl focus:ring-2 focus:ring-gray-700 outline-none placeholder:text-gray-500">

        <i class="fas fa-user-circle text-2xl text-black"></i>
      </a>
    </div>
    <div id="search-results" class="hidden absolute z-50 bg-white rounded-2xl shadow-2xl border border-gray-100 mt-1 w-full max-w-2xl"></div>
  </header>

  <!-- ===== KONTEN BERANDA ===== -->
  <!-- Category icons -->
  <section id="category-icons" class="grid grid-cols-5 gap-3 mb-8"></section>

  <!-- Banner -->
  <section class="mb-8">
    <div class="relative w-full bg-white rounded-[2rem] overflow-hidden shadow-sm border border-gray-100 flex flex-col md:flex-row items-center justify-between">
      <div class="absolute inset-0 bg-gradient-to-r from-white via-white/70 to-transparent z-10"></div>
      <div class="relative z-20 px-8 md:px-16 py-8 md:py-12 flex-1">
        <p class="text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">Platform Konten Digital</p>
        <h2 class="text-2xl md:text-4xl font-bold text-black tracking-tight leading-tight mb-2">Eksplorasi Dunia Baru</h2>
        <p class="text-sm md:text-base text-gray-500 max-w-sm font-light leading-relaxed mb-4">Kurasi konten eksklusif untuk gaya hidup digital Anda.</p>
        <a href="kategori.html" class="px-8 py-3 bg-black text-white rounded-full font-bold hover:bg-zinc-800 transition shadow-xl text-sm inline-block">Lihat Semua</a>
      </div>
      <div class="hidden md:block absolute right-0 top-0 h-full w-1/3 bg-black rounded-l-[5rem]"></div>
    </div>
  </section>

  <!-- Content Grid -->
  <section>
    <div class="flex items-center justify-between mb-5">
      <h2 class="text-2xl font-bold text-black">Konten Terbaru</h2>
      <a href="kategori.html" class="text-sm text-black border-b border-black font-bold pb-0.5 uppercase tracking-widest">Lihat Semua</a>
    </div>
    <div id="beranda-content-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4"></div>
  </section>

</main>

<div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 z-40 hidden lg:hidden"></div>
<div id="toast"></div>

<script src="js/menu.js"></script>
<script>
(function() {
  // Deteksi halaman berdasarkan nama file
  const page = window.location.pathname.split('/').pop().replace('.html', '') || 'index';
  
  // Panggil fungsi render yang sesuai
  function callRender() {
    if (page === 'index' && typeof renderBeranda === 'function') renderBeranda();
    else if (page === 'kategori' && typeof renderKategori === 'function') renderKategori();
    else if (page === 'diskusi' && typeof renderDiskusi === 'function') renderDiskusi();
    else if (page === 'tren' && typeof renderTren === 'function') renderTren();
    else if (page === 'disimpan' && typeof renderDisimpan === 'function') renderDisimpan();
    else if (page === 'pengaturan' && typeof renderPengaturan === 'function') renderPengaturan();
    else if (page === 'profil' && typeof renderProfil === 'function') renderProfil();
  }
  
  // Jika halaman butuh login (profil, pengaturan, disimpan) cek dulu
  const needAuth = ['profil', 'pengaturan', 'disimpan'].includes(page);
  
  // Tunggu window._SB dan CURRENT_USER siap
  let interval = setInterval(() => {
    if (window._SB && window._SB.getCurrentUser) {
      clearInterval(interval);
      
      if (needAuth) {
        window._SB.getCurrentUser().then(user => {
          if (!user) {
            window.location.href = 'auth.html';
          } else {
            // Tunggu CURRENT_USER & CURRENT_PROFILE (biasanya diisi oleh init() di menu.js)
            let waitProfile = setInterval(() => {
              if (window.CURRENT_USER && window.CURRENT_PROFILE) {
                clearInterval(waitProfile);
                callRender();
              }
            }, 100);
            setTimeout(() => clearInterval(waitProfile), 5000);
          }
        });
      } else {
        callRender();
      }
    }
  }, 200);
  setTimeout(() => clearInterval(interval), 5000);
})();
</script>
</body>
</html>
