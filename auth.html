<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nissan Ex — Masuk / Daftar</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&display=swap" rel="stylesheet">
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/+esm'
'sb_publishable_hWnbHiYsUObBrPJuzDu3YQ_PYBhLn39'
  const SUPABASE_KEY ='sb_publishable_hWnbHiYsUObBrPJuzDu3YQ_PYBhLn39'
  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

  window.supabase = supabase

  function toast(msg, isError = false) {
    const el = document.getElementById('toast')
    el.textContent = msg
    el.style.background = isError ? '#dc2626' : '#111'
    el.classList.add('show')
    setTimeout(() => {
      el.classList.remove('show')
      el.style.background = '#111'
    }, 3000)
  }

  function setLoading(btnId, isLoading, originalText) {
    const btn = document.getElementById(btnId)
    if (isLoading) {
      btn.disabled = true
      btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Memproses...'
    } else {
      btn.disabled = false
      btn.innerHTML = originalText
    }
  }

  async function checkSession() {
    const { data: { session } } = await supabase.auth.getSession()
    if (session) {
      window.location.href = 'index.html'
    }
  }
  checkSession()

  window.setTab = function(tab) {
    document.getElementById('panel-masuk').classList.toggle('hidden', tab !== 'masuk')
    document.getElementById('panel-daftar').classList.toggle('hidden', tab !== 'daftar')
    
    const tabMasuk = document.getElementById('tab-masuk')
    const tabDaftar = document.getElementById('tab-daftar')
    
    if (tab === 'masuk') {
      tabMasuk.className = 'flex-1 py-2 rounded-lg text-sm font-bold bg-black text-white transition'
      tabDaftar.className = 'flex-1 py-2 rounded-lg text-sm font-bold text-gray-500 transition'
    } else {
      tabMasuk.className = 'flex-1 py-2 rounded-lg text-sm font-bold text-gray-500 transition'
      tabDaftar.className = 'flex-1 py-2 rounded-lg text-sm font-bold bg-black text-white transition'
    }
  }

  window.doLogin = async function() {
    const email = document.getElementById('login-email').value.trim()
    const pass = document.getElementById('login-pass').value
    const errEl = document.getElementById('login-error')
    
    if (!email || !pass) {
      errEl.textContent = 'Email dan password wajib diisi'
      errEl.classList.remove('hidden')
      return
    }
    errEl.classList.add('hidden')
    
    setLoading('login-btn', true, 'Masuk')
    
    const { error } = await supabase.auth.signInWithPassword({ email, password: pass })
    
    if (error) {
      errEl.textContent = error.message === 'Invalid login credentials' ? 'Email atau password salah' : error.message
      errEl.classList.remove('hidden')
      setLoading('login-btn', false, 'Masuk')
    } else {
      toast('Berhasil masuk!')
      setTimeout(() => { window.location.href = 'index.html' }, 800)
    }
  }

  window.doRegister = async function() {
    const name = document.getElementById('reg-name').value.trim()
    const username = document.getElementById('reg-username').value.trim()
    const email = document.getElementById('reg-email').value.trim()
    const pass = document.getElementById('reg-pass').value
    const passConfirm = document.getElementById('reg-pass-confirm').value
    const errEl = document.getElementById('reg-error')
    
    errEl.classList.add('hidden')
    
    if (!name || !username || !email || !pass || !passConfirm) {
      errEl.textContent = 'Semua field wajib diisi'
      errEl.classList.remove('hidden')
      return
    }
    if (pass.length < 6) {
      errEl.textContent = 'Password minimal 6 karakter'
      errEl.classList.remove('hidden')
      return
    }
    if (pass !== passConfirm) {
      errEl.textContent = 'Password dan konfirmasi tidak cocok'
      errEl.classList.remove('hidden')
      return
    }
    if (username.length < 3) {
      errEl.textContent = 'Username minimal 3 karakter'
      errEl.classList.remove('hidden')
      return
    }
    
    setLoading('register-btn', true, 'Buat Akun')
    
    const { data, error } = await supabase.auth.signUp({
      email,
      password: pass,
      options: { data: { username, full_name: name } }
    })
    
    if (error) {
      errEl.textContent = error.message
      errEl.classList.remove('hidden')
      setLoading('register-btn', false, 'Buat Akun')
      return
    }
    
    if (data.user) {
      // Simpan ke tabel users
      await supabase.from('users').upsert({
        auth_id: data.user.id,
        username: username,
        full_name: name,
        email: email,
        created_at: new Date().toISOString()
      })
      
      toast('Akun berhasil dibuat! Silakan masuk.')
      document.getElementById('reg-name').value = ''
      document.getElementById('reg-username').value = ''
      document.getElementById('reg-email').value = ''
      document.getElementById('reg-pass').value = ''
      document.getElementById('reg-pass-confirm').value = ''
      
      setTimeout(() => {
        window.setTab('masuk')
        document.getElementById('login-email').value = email
      }, 1200)
    }
    setLoading('register-btn', false, 'Buat Akun')
  }

  // Enter key submit
  document.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      if (!document.getElementById('panel-masuk').classList.contains('hidden')) {
        doLogin()
      } else {
        doRegister()
      }
    }
  })
</script>
<style>
  body { font-family: Georgia, serif; background: #f3f4f6; }
  .brand-lora { font-family: 'Lora', serif; }
  .form-input { width:100%; border:1.5px solid #e5e7eb; border-radius:10px; padding:10px 14px; font-family:Georgia,serif; font-size:14px; outline:none; transition:border .2s; }
  .form-input:focus { border-color:#000; }
  #toast { position:fixed; bottom:24px; right:24px; background:#111; color:#fff; padding:12px 20px; border-radius:12px; font-size:13px; z-index:999; opacity:0; transition:opacity .3s; pointer-events:none; }
  #toast.show { opacity:1; }
  button:disabled { opacity:0.6; cursor:not-allowed; }
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-sm">
  <div class="text-center mb-8">
    <div class="w-12 h-12 bg-black rounded-2xl flex items-center justify-center mx-auto mb-3">
      <span class="text-white font-bold text-2xl leading-none brand-lora">N</span>
    </div>
    <h1 class="text-2xl font-bold brand-lora">Nissan Ex</h1>
    <p class="text-sm text-gray-500 mt-1">Platform Konten Digital</p>
  </div>

  <div class="bg-white rounded-3xl shadow-xl border border-gray-100 p-8">
    <div class="flex gap-1 bg-gray-100 p-1 rounded-xl mb-6">
      <button id="tab-masuk" onclick="setTab('masuk')" class="flex-1 py-2 rounded-lg text-sm font-bold bg-black text-white transition">Masuk</button>
      <button id="tab-daftar" onclick="setTab('daftar')" class="flex-1 py-2 rounded-lg text-sm font-bold text-gray-500 transition">Daftar</button>
    </div>

    <div id="panel-masuk">
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Email</label>
          <input id="login-email" type="email" class="form-input" placeholder="email@contoh.com">
        </div>
        <div>
          <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Password</label>
          <input id="login-pass" type="password" class="form-input" placeholder="••••••••">
        </div>
        <p id="login-error" class="text-red-500 text-xs hidden"></p>
        <button id="login-btn" onclick="doLogin()" class="w-full bg-black text-white py-3 rounded-xl font-bold hover:bg-zinc-800 transition">
          <i class="fas fa-sign-in-alt mr-2"></i>Masuk
        </button>
      </div>
    </div>

    <div id="panel-daftar" class="hidden">
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Nama Lengkap</label>
          <input id="reg-name" type="text" class="form-input" placeholder="Nama lengkap">
        </div>
        <div>
          <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Username</label>
          <input id="reg-username" type="text" class="form-input" placeholder="username">
        </div>
        <div>
          <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Email</label>
          <input id="reg-email" type="email" class="form-input" placeholder="email@contoh.com">
        </div>
        <div>
          <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Password</label>
          <input id="reg-pass" type="password" class="form-input" placeholder="Min. 6 karakter">
        </div>
        <div>
          <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Konfirmasi Password</label>
          <input id="reg-pass-confirm" type="password" class="form-input" placeholder="Ulangi password">
        </div>
        <p id="reg-error" class="text-red-500 text-xs hidden"></p>
        <button id="register-btn" onclick="doRegister()" class="w-full bg-black text-white py-3 rounded-xl font-bold hover:bg-zinc-800 transition">
          <i class="fas fa-user-plus mr-2"></i>Buat Akun
        </button>
      </div>
    </div>
  </div>

  <p class="text-center text-xs text-gray-400 mt-6">
    Dengan masuk, kamu menyetujui syarat dan ketentuan Nissan Ex.
  </p>
</div>

<div id="toast"></div>
</body>
</html>
